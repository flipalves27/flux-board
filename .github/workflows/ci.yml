name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: github-actions-ci-jwt-secret-placeholder-min-32
      ADMIN_INITIAL_PASSWORD: github-actions-ci-admin-bootstrap-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: node scripts/ci-forbid-env-in-git.mjs
      - run: node scripts/ci-forbid-banned-terms.mjs
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run lint:flux-colors
      - run: npm run lint:css
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run knip
      - run: npm run security:audit
      - run: npm run build
