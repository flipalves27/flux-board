<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuários — Flux-Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--flux-primary:#6C5CE7;--flux-primary-light:#A29BFE;--flux-surface-dark:#0D0B1A;--flux-surface-mid:#1A1730;--flux-surface-card:#221F3A;--flux-text:#F0EEFF;--flux-text-muted:#9B97C2;--flux-danger:#FF6B6B;--font-d:'Outfit',sans-serif;--font-b:'DM Sans',sans-serif;--rad:10px;--shadow:0 4px 20px rgba(0,0,0,.3)}
body{font-family:var(--font-b);background:var(--flux-surface-dark);color:var(--flux-text);min-height:100vh}
.hdr{background:var(--flux-surface-mid);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;border-bottom:1px solid rgba(108,92,231,.2)}
.brand{display:flex;align-items:center;gap:.6rem}
.brand-bar{width:4px;height:24px;background:linear-gradient(180deg,var(--flux-primary),#4834D4);border-radius:2px}
.brand h1{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--flux-text)}
.brand h1 span{color:var(--flux-primary-light)}
.btn{padding:.45rem .9rem;border-radius:10px;font-family:var(--font-b);font-weight:600;font-size:.8rem;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--flux-primary),#4834D4);color:var(--flux-text);box-shadow:0 4px 12px rgba(108,92,231,.35)}
.btn-primary:hover{background:var(--flux-primary-light);color:var(--flux-surface-dark)}
.btn-ghost{background:transparent;color:var(--flux-text-muted);border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{color:var(--flux-text);border-color:var(--flux-primary);background:rgba(108,92,231,.1)}
.main{max-width:900px;margin:0 auto;padding:2rem 1.5rem}
.main h2{font-family:var(--font-d);font-size:1.4rem;font-weight:700;color:var(--flux-text);margin-bottom:1.5rem}
.table-wrap{background:var(--flux-surface-card);border-radius:var(--rad);box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(108,92,231,.2)}
table{width:100%;border-collapse:collapse}
th,td{padding:.75rem 1rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}
th{background:var(--flux-surface-mid);font-family:var(--font-d);font-size:.75rem;font-weight:700;color:var(--flux-text-muted);text-transform:uppercase;letter-spacing:.04em}
tr:hover td{background:rgba(108,92,231,.06)}
.badge-admin{font-size:.65rem;font-weight:700;padding:.15rem .4rem;border-radius:6px;background:var(--flux-primary);color:var(--flux-text)}
.actions-cell{display:flex;gap:.35rem}
.actions-cell button{padding:.25rem .5rem;font-size:.7rem;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:var(--flux-surface-mid);color:var(--flux-text-muted);cursor:pointer;transition:all .15s}
.actions-cell button:hover{background:rgba(108,92,231,.2);border-color:var(--flux-primary);color:var(--flux-primary-light)}
.actions-cell .btn-del:hover{background:rgba(255,107,107,.15);border-color:var(--flux-danger);color:var(--flux-danger)}
.modal-overlay{position:fixed;inset:0;background:rgba(13,11,26,.85);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--flux-surface-card);border-radius:var(--rad);padding:1.5rem;min-width:360px;max-width:95%;border:1px solid rgba(108,92,231,.2)}
.modal h3{margin-bottom:1rem;font-family:var(--font-d);color:var(--flux-text)}
.form-row{margin-bottom:1rem}
.form-label{display:block;font-size:.7rem;font-weight:600;color:var(--flux-text-muted);margin-bottom:.3rem}
.form-input{width:100%;padding:.5rem;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;font-size:.9rem;background:var(--flux-surface-mid);color:var(--flux-text)}
.form-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
.err{color:var(--flux-danger);font-size:.8rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="hdr">
  <div class="brand"><a href="boards.html" style="color:var(--flux-text-muted);font-size:.85rem;text-decoration:none;margin-right:.5rem">← Boards</a><div class="brand-bar"></div><h1>flux-board <span>— Usuários</span></h1></div>
  <button class="btn btn-primary" onclick="openNewUserModal()">+ Novo Usuário</button>
</div>
<div class="main">
  <h2>Administrar Usuários</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Nome</th><th>E-mail</th><th>Tipo</th><th>Ações</th></tr></thead>
      <tbody id="users-tbody"></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Novo Usuário</h3>
    <div id="modal-err" class="err"></div>
    <div class="form-row"><label class="form-label">Nome</label><input class="form-input" id="user-name" placeholder="Nome completo"></div>
    <div class="form-row"><label class="form-label">E-mail</label><input class="form-input" id="user-email" type="email" placeholder="email@exemplo.com"></div>
    <div class="form-row"><label class="form-label">Senha</label><input class="form-input" id="user-pwd" type="password" placeholder="Mínimo 4 caracteres"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-modal-save">Salvar</button>
    </div>
  </div>
</div>

<script>
const AUTH_KEY = "reborn_auth";

function getAuth() {
  const raw = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

function redirectLogin() {
  if (!getAuth()) { window.location.href = "login.html"; return true; }
  return false;
}

function redirectIfNotAdmin() {
  const auth = getAuth();
  if (!auth?.user?.isAdmin) { window.location.href = "boards.html"; return true; }
  return false;
}

async function api(path, opts = {}) {
  const auth = getAuth();
  if (!auth?.token) return null;
  const headers = { ...opts.headers, Authorization: "Bearer " + auth.token };
  if (opts.body && typeof opts.body === "object") {
    headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(path, { ...opts, headers });
  if (r.status === 401) { localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(AUTH_KEY); window.location.href = "login.html"; return null; }
  if (r.status === 403) { window.location.href = "boards.html"; return null; }
  return r;
}

async function loadUsers() {
  const r = await api("/api/users");
  if (!r || !r.ok) return;
  const { users } = await r.json();
  const tbody = document.getElementById("users-tbody");
  tbody.innerHTML = (users || []).map((u) => `
    <tr data-id="${escapeHtml(u.id)}" data-name="${escapeHtml(u.name)}" data-email="${escapeHtml(u.email)}">
      <td>${escapeHtml(u.name)}</td>
      <td>${escapeHtml(u.email)}</td>
      <td>${u.isAdmin ? '<span class="badge-admin">Admin</span>' : "Usuário"}</td>
      <td class="actions-cell">
        ${u.id !== "admin" ? `<button class="btn-edit">Editar</button><button class="btn-del">Excluir</button>` : "-"}
      </td>
    </tr>
  `).join("");
  tbody.querySelectorAll(".btn-edit").forEach((btn) => {
    btn.onclick = () => { const tr = btn.closest("tr"); editUser(tr.dataset.id, tr.dataset.name, tr.dataset.email); };
  });
  tbody.querySelectorAll(".btn-del").forEach((btn) => {
    btn.onclick = () => { const tr = btn.closest("tr"); deleteUser(tr.dataset.id, tr.dataset.name); };
  });
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

let editingUserId = null;

function openNewUserModal() {
  editingUserId = null;
  document.getElementById("modal-title").textContent = "Novo Usuário";
  document.getElementById("user-name").value = "";
  document.getElementById("user-email").value = "";
  document.getElementById("user-email").disabled = false;
  document.getElementById("user-pwd").value = "";
  document.getElementById("user-pwd").placeholder = "Mínimo 4 caracteres";
  document.getElementById("btn-modal-save").textContent = "Criar";
  document.getElementById("btn-modal-save").onclick = createUser;
  document.getElementById("modal-err").textContent = "";
  document.getElementById("modal-overlay").classList.add("show");
}

function editUser(id, name, email) {
  editingUserId = id;
  document.getElementById("modal-title").textContent = "Editar Usuário";
  document.getElementById("user-name").value = name;
  document.getElementById("user-email").value = email;
  document.getElementById("user-email").disabled = true;
  document.getElementById("user-pwd").value = "";
  document.getElementById("user-pwd").placeholder = "Deixe em branco para manter";
  document.getElementById("btn-modal-save").textContent = "Salvar";
  document.getElementById("btn-modal-save").onclick = () => saveUser(id);
  document.getElementById("modal-err").textContent = "";
  document.getElementById("modal-overlay").classList.add("show");
}

async function createUser() {
  const name = document.getElementById("user-name").value.trim();
  const email = document.getElementById("user-email").value.trim();
  const pwd = document.getElementById("user-pwd").value;
  const errEl = document.getElementById("modal-err");
  errEl.textContent = "";
  if (!name || !email || !pwd) { errEl.textContent = "Preencha todos os campos."; return; }
  if (pwd.length < 4) { errEl.textContent = "Senha deve ter pelo menos 4 caracteres."; return; }
  const r = await api("/api/users", { method: "POST", body: { name, email, password: pwd } });
  if (!r) return;
  const data = await r.json();
  if (!r.ok) { errEl.textContent = data.error || "Erro ao criar."; return; }
  closeModal();
  loadUsers();
}

async function saveUser(id) {
  const name = document.getElementById("user-name").value.trim();
  const pwd = document.getElementById("user-pwd").value;
  const errEl = document.getElementById("modal-err");
  errEl.textContent = "";
  if (!name) { errEl.textContent = "Nome é obrigatório."; return; }
  const body = { name };
  if (pwd.length >= 4) body.password = pwd;
  const r = await api("/api/users/" + id, { method: "PUT", body });
  if (!r) return;
  const data = await r.json();
  if (!r.ok) { errEl.textContent = data.error || "Erro ao salvar."; return; }
  closeModal();
  loadUsers();
}

async function deleteUser(id, name) {
  if (!confirm('Excluir o usuário "' + name + '"? Esta ação não pode ser desfeita.')) return;
  const r = await api("/api/users/" + id, { method: "DELETE" });
  if (!r || !r.ok) { alert("Erro ao excluir."); return; }
  loadUsers();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modal-overlay").classList.remove("show");
}

if (redirectLogin() || redirectIfNotAdmin()) {}
else loadUsers();
</script>
</body>
</html>
