<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="shortcut icon" href="favicon.svg">
<title>Meus Boards — Flux-Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--flux-primary:#6C5CE7;--flux-primary-light:#A29BFE;--flux-primary-dark:#4834D4;--flux-secondary:#00D2D3;--flux-accent:#FDA7DF;--flux-surface-dark:#0D0B1A;--flux-surface-mid:#1A1730;--flux-surface-card:#221F3A;--flux-surface-elevated:#2D2952;--flux-text:#F0EEFF;--flux-text-muted:#9B97C2;--flux-danger:#FF6B6B;--font-d:'Outfit',sans-serif;--font-b:'DM Sans',sans-serif;--rad:10px;--shadow:0 4px 20px rgba(0,0,0,.3)}
body{font-family:var(--font-b);background:var(--flux-surface-dark);color:var(--flux-text);min-height:100vh}
.hdr{background:var(--flux-surface-mid);padding:.85rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;border-bottom:1px solid rgba(108,92,231,.2)}
.brand{display:flex;align-items:center;gap:.6rem}
.brand-bar{width:4px;height:24px;background:linear-gradient(180deg,var(--flux-primary),var(--flux-primary-dark));border-radius:2px}
.brand h1{font-family:var(--font-d);font-size:1rem;font-weight:700;letter-spacing:-0.5px;color:var(--flux-text)}
.brand h1 span{color:var(--flux-primary-light)}
.user-info{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.user-name{font-size:.85rem;color:var(--flux-text-muted)}
.btn{padding:.45rem .9rem;border-radius:10px;font-family:var(--font-b);font-weight:600;font-size:.8rem;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--flux-primary),var(--flux-primary-dark));color:var(--flux-text);box-shadow:0 4px 12px rgba(108,92,231,.35)}
.btn-primary:hover{background:var(--flux-primary-light);color:var(--flux-surface-dark)}
.btn-ghost{background:transparent;color:var(--flux-text-muted);border:1px solid rgba(255,255,255,.2)}
.btn-ghost:hover{color:var(--flux-text);border-color:var(--flux-primary);background:rgba(108,92,231,.1)}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.main h2{font-family:var(--font-d);font-size:1.4rem;font-weight:700;color:var(--flux-text);margin-bottom:1.5rem}
.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.board-card{background:var(--flux-surface-card);border:1px solid rgba(108,92,231,.2);border-radius:var(--rad);padding:1.25rem;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:.5rem;position:relative}
.board-card:hover{box-shadow:0 8px 24px rgba(108,92,231,.2);border-color:var(--flux-primary)}
.board-card h3{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--flux-text)}
.board-card .meta{font-size:.75rem;color:var(--flux-text-muted)}
.board-card .actions{display:flex;gap:.35rem;margin-top:auto;padding-top:.5rem}
.board-card .actions button{padding:.3rem .5rem;font-size:.7rem;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:var(--flux-surface-elevated);color:var(--flux-text-muted);cursor:pointer;transition:all .15s}
.board-card .actions button:hover{background:rgba(108,92,231,.2);border-color:var(--flux-primary);color:var(--flux-primary-light)}
.board-card .actions .btn-del:hover{background:rgba(255,107,107,.15);border-color:var(--flux-danger);color:var(--flux-danger)}
.card-new{background:var(--flux-surface-mid);border:2px dashed rgba(108,92,231,.3);display:flex;align-items:center;justify-content:center;min-height:120px;color:var(--flux-text-muted);font-weight:600;font-size:.95rem;border-radius:var(--rad)}
.card-new:hover{background:rgba(108,92,231,.08);border-color:var(--flux-primary);color:var(--flux-primary-light)}
.empty{text-align:center;padding:3rem;color:var(--flux-text-muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(13,11,26,.85);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:var(--flux-surface-card);border-radius:var(--rad);padding:1.5rem;min-width:320px;border:1px solid rgba(108,92,231,.2)}
.modal h3{margin-bottom:1rem;font-family:var(--font-d);color:var(--flux-text)}
.modal .form-row{margin-bottom:1rem}
.modal .form-label{display:block;font-size:.7rem;font-weight:600;color:var(--flux-text-muted);margin-bottom:.3rem}
.modal .form-input{width:100%;padding:.5rem;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;font-size:.9rem;background:var(--flux-surface-mid);color:var(--flux-text)}
.modal .form-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
.custom-tooltip-fallback{pointer-events:none;position:fixed;z-index:9999;max-width:260px;border-radius:8px;border:1px solid rgba(108,92,231,.35);background:rgba(20,16,44,.95);padding:.35rem .6rem;font-size:11px;font-weight:500;line-height:1.35;color:var(--flux-text);box-shadow:0 10px 30px rgba(0,0,0,.45);backdrop-filter:blur(6px);opacity:0;visibility:hidden;transition:opacity .12s ease}
.custom-tooltip-fallback.show{opacity:1;visibility:visible}
</style>
</head>
<body>
<div class="hdr">
  <div class="brand"><div class="brand-bar"></div><h1>flux-board <span>— Meus Boards</span></h1></div>
  <div class="user-info">
    <span class="user-name" id="user-name"></span>
    <a href="users.html" class="btn btn-ghost" id="link-admin" style="display:none">Administrar Usuários</a>
    <button class="btn btn-ghost" onclick="logout()">Sair</button>
  </div>
</div>
<div class="main">
  <h2>Meus Boards</h2>
  <div class="board-grid" id="board-grid">
    <div class="card-new" onclick="openNewBoardModal()">+ Novo Board</div>
  </div>
  <div class="empty" id="empty-msg" style="display:none">Nenhum board ainda. Clique em "Novo Board" para criar.</div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Novo Board</h3>
    <div class="form-row"><label class="form-label">Nome do Board</label><input class="form-input" id="board-name" placeholder="Ex: Backlog Principal"></div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-modal-save">Criar</button>
    </div>
  </div>
</div>

<script>
const AUTH_KEY = "reborn_auth";
const TOOLTIP_DATA_ATTR = "data-tooltip-content";
let _tooltipEl = null, _tooltipAnchor = null;

function getTooltipCoords(triggerRect, tooltipRect, offset) {
  return {
    top: triggerRect.top - tooltipRect.height - offset,
    left: triggerRect.left + triggerRect.width / 2 - tooltipRect.width / 2
  };
}

function clampTooltipToViewport(coords, tooltipRect, padding) {
  const maxLeft = window.innerWidth - tooltipRect.width - padding;
  const maxTop = window.innerHeight - tooltipRect.height - padding;
  return {
    left: Math.min(Math.max(coords.left, padding), Math.max(maxLeft, padding)),
    top: Math.min(Math.max(coords.top, padding), Math.max(maxTop, padding))
  };
}

function getTooltipTarget(el) {
  if (!el || !el.closest) return null;
  return el.closest(`[title],[${TOOLTIP_DATA_ATTR}]`);
}

function hoistNativeTitle(el) {
  if (!el) return "";
  const nativeTitle = el.getAttribute("title");
  if (nativeTitle) {
    el.setAttribute(TOOLTIP_DATA_ATTR, nativeTitle);
    el.removeAttribute("title");
    if (!el.getAttribute("aria-label") && !el.getAttribute("aria-labelledby")) {
      el.setAttribute("aria-label", nativeTitle);
    }
  }
  return (el.getAttribute(TOOLTIP_DATA_ATTR) || "").trim();
}

function ensureTooltipEl() {
  if (_tooltipEl) return _tooltipEl;
  const el = document.createElement("div");
  el.className = "custom-tooltip-fallback";
  el.setAttribute("role", "tooltip");
  document.body.appendChild(el);
  _tooltipEl = el;
  return el;
}

function hideCustomTooltip() {
  if (!_tooltipEl) return;
  _tooltipEl.classList.remove("show");
  _tooltipEl.style.top = "-9999px";
  _tooltipEl.style.left = "-9999px";
  _tooltipAnchor = null;
}

function updateCustomTooltipPosition() {
  if (!_tooltipEl || !_tooltipAnchor) return;
  const triggerRect = _tooltipAnchor.getBoundingClientRect();
  const tooltipRect = _tooltipEl.getBoundingClientRect();
  const next = getTooltipCoords(triggerRect, tooltipRect, 10);
  const clamped = clampTooltipToViewport(next, tooltipRect, 8);
  _tooltipEl.style.top = clamped.top + "px";
  _tooltipEl.style.left = clamped.left + "px";
}

function showCustomTooltip(anchor, text) {
  const value = (text || "").trim();
  if (!anchor || !value) { hideCustomTooltip(); return; }
  const tooltip = ensureTooltipEl();
  _tooltipAnchor = anchor;
  tooltip.textContent = value;
  tooltip.classList.add("show");
  updateCustomTooltipPosition();
}

function initCustomTooltipFallback() {
  document.querySelectorAll("[title]").forEach((el) => { hoistNativeTitle(el); });
  document.addEventListener("pointerover", (e) => {
    const target = getTooltipTarget(e.target);
    if (!target) { hideCustomTooltip(); return; }
    const text = hoistNativeTitle(target);
    if (!text) { hideCustomTooltip(); return; }
    showCustomTooltip(target, text);
  });
  document.addEventListener("pointerout", (e) => {
    if (!_tooltipAnchor) return;
    const next = e.relatedTarget;
    if (next && _tooltipAnchor.contains(next)) return;
    hideCustomTooltip();
  });
  document.addEventListener("focusin", (e) => {
    const target = getTooltipTarget(e.target);
    if (!target) { hideCustomTooltip(); return; }
    const text = hoistNativeTitle(target);
    if (!text) { hideCustomTooltip(); return; }
    showCustomTooltip(target, text);
  });
  document.addEventListener("focusout", (e) => {
    if (!_tooltipAnchor) return;
    const next = e.relatedTarget;
    if (next && _tooltipAnchor.contains(next)) return;
    hideCustomTooltip();
  });
  document.addEventListener("scroll", () => { if (_tooltipAnchor) updateCustomTooltipPosition(); }, true);
  window.addEventListener("resize", () => { if (_tooltipAnchor) updateCustomTooltipPosition(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") hideCustomTooltip(); });
}

function getAuth() {
  const raw = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
  if (!raw) return null;
  try {
    return JSON.parse(raw);
  } catch { return null; }
}

function redirectLogin() {
  if (!getAuth()) { window.location.href = "login.html"; return true; }
  return false;
}

async function api(path, opts = {}) {
  const auth = getAuth();
  if (!auth?.token) return null;
  const headers = { ...opts.headers, Authorization: "Bearer " + auth.token };
  if (opts.body && typeof opts.body === "object" && !(opts.body instanceof FormData)) {
    headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(path, { ...opts, headers });
  if (r.status === 401) { localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(AUTH_KEY); window.location.href = "login.html"; return null; }
  return r;
}

async function loadBoards() {
  const r = await api("/api/boards");
  if (!r || !r.ok) return;
  const { boards } = await r.json();
  const grid = document.getElementById("board-grid");
  const empty = document.getElementById("empty-msg");
  grid.innerHTML = '<div class="card-new" onclick="openNewBoardModal()">+ Novo Board</div>';
  if (boards && boards.length > 0) {
    empty.style.display = "none";
      boards.forEach((b) => {
        const card = document.createElement("div");
        card.className = "board-card";
        const isBoardReborn = b.id === "b_reborn";
        const isAdmin = getAuth()?.user?.isAdmin;
        const actionsHtml = isBoardReborn
          ? (isAdmin
              ? `<div class="actions"><button class="btn-del" onclick="event.stopPropagation();deleteBoard('${b.id}','${escapeHtml(b.name).replace(/'/g,"\\'")}')">Excluir</button></div>`
              : '<span class="meta" style="font-style:italic">Board padrão</span>')
          : `<div class="actions">
          <button onclick="event.stopPropagation();editBoardName('${b.id}','${escapeHtml(b.name).replace(/'/g,"\\'")}')">Renomear</button>
          <button class="btn-del" onclick="event.stopPropagation();deleteBoard('${b.id}','${escapeHtml(b.name).replace(/'/g,"\\'")}')">Excluir</button>
        </div>`;
        card.innerHTML = `
        <h3>${escapeHtml(b.name)}</h3>
        <span class="meta">Atualizado: ${formatDate(b.lastUpdated)}</span>
        ${actionsHtml}
      `;
        card.onclick = () => { window.location.href = "board.html?id=" + encodeURIComponent(b.id); };
        grid.insertBefore(card, grid.firstChild);
      });
  } else {
    empty.style.display = "block";
  }
}

function formatDate(s) {
  if (!s) return "-";
  try {
    const d = new Date(s);
    return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" });
  } catch { return s; }
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function openNewBoardModal() {
  document.getElementById("modal-title").textContent = "Novo Board";
  document.getElementById("board-name").value = "";
  document.getElementById("board-name").dataset.boardId = "";
  document.getElementById("btn-modal-save").textContent = "Criar";
  document.getElementById("btn-modal-save").onclick = createBoard;
  document.getElementById("modal-overlay").classList.add("show");
  document.getElementById("board-name").focus();
}

function editBoardName(id, name) {
  document.getElementById("modal-title").textContent = "Renomear Board";
  document.getElementById("board-name").value = name;
  document.getElementById("board-name").dataset.boardId = id;
  document.getElementById("btn-modal-save").textContent = "Salvar";
  document.getElementById("btn-modal-save").onclick = () => saveBoardName(id);
  document.getElementById("modal-overlay").classList.add("show");
}

async function createBoard() {
  const name = document.getElementById("board-name").value.trim() || "Novo Board";
  const r = await api("/api/boards", { method: "POST", body: { name } });
  if (!r || !r.ok) { alert("Erro ao criar board."); return; }
  const { board } = await r.json();
  closeModal();
  window.location.href = "board.html?id=" + encodeURIComponent(board.id);
}

async function saveBoardName(id) {
  const name = document.getElementById("board-name").value.trim() || "Board";
  const r = await api("/api/boards/" + id, { method: "PUT", body: { name } });
  if (!r || !r.ok) { alert("Erro ao renomear."); return; }
  closeModal();
  loadBoards();
}

async function deleteBoard(id, name) {
  if (!confirm('Excluir o board "' + name + '"? Esta ação não pode ser desfeita.')) return;
  const r = await api("/api/boards/" + id, { method: "DELETE" });
  if (!r || !r.ok) { alert("Erro ao excluir."); return; }
  loadBoards();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById("modal-overlay").classList.remove("show");
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  sessionStorage.removeItem(AUTH_KEY);
  window.location.href = "login.html";
}

if (redirectLogin()) {}
else {
  initCustomTooltipFallback();
  const auth = getAuth();
  document.getElementById("user-name").textContent = auth?.user?.name || auth?.user?.username || "Usuário";
  if (auth?.user?.isAdmin) document.getElementById("link-admin").style.display = "inline-block";
  loadBoards();
}
</script>
</body>
</html>
