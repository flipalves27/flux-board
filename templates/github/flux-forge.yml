# Flux Forge — customer repo workflow (repository_dispatch event_type: flux-forge)
# Copy to .github/workflows/flux-forge.yml and adjust commands for your stack.

name: Flux Forge CI

on:
  repository_dispatch:
    types: [flux-forge]

concurrency:
  group: flux-forge-${{ github.event.client_payload.forgeJobId || github.run_id }}
  cancel-in-progress: true

jobs:
  forge-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || github.sha }}

      - name: Detect stack
        id: stack
        run: |
          if [ -f package.json ]; then echo "kind=node" >> $GITHUB_OUTPUT; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then echo "kind=python" >> $GITHUB_OUTPUT; fi

      - name: Node — install & verify
        if: steps.stack.outputs.kind == 'node'
        run: |
          if [ -f package-lock.json ]; then npm ci; elif [ -f pnpm-lock.yaml ]; then npm i -g pnpm && pnpm i --frozen-lockfile; else npm install; fi
          npm run lint --if-present
          npm test --if-present

      - name: Python — lint & test
        if: steps.stack.outputs.kind == 'python'
        run: |
          pip install -U pip
          pip install ruff pytest || true
          ruff check . || true
          pytest -q || true

      - name: Report (placeholder)
        run: echo "Flux Forge gate completed for job ${{ github.event.client_payload.forgeJobId }}"
