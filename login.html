<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Flux-Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--flux-primary:#6C5CE7;--flux-primary-light:#A29BFE;--flux-primary-dark:#4834D4;--flux-secondary:#00D2D3;--flux-accent:#FDA7DF;--flux-surface-dark:#0D0B1A;--flux-surface-mid:#1A1730;--flux-surface-card:#221F3A;--flux-surface-elevated:#2D2952;--flux-text:#F0EEFF;--flux-text-muted:#9B97C2;--flux-success:#00E676;--flux-danger:#FF6B6B;--font-d:'Outfit',sans-serif;--font-b:'DM Sans',sans-serif;--rad:12px;--shadow:0 8px 32px rgba(108,92,231,.25)}
body{font-family:var(--font-b);background:var(--flux-surface-dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;color:var(--flux-text)}
.card{background:var(--flux-surface-card);border-radius:var(--rad);box-shadow:var(--shadow);border:1px solid rgba(108,92,231,.2);width:100%;max-width:400px;padding:2rem}
.brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1.5rem}
.brand-bar{width:4px;height:28px;background:linear-gradient(180deg,var(--flux-primary),var(--flux-primary-dark));border-radius:2px}
.brand h1{font-family:var(--font-d);font-size:1.25rem;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--flux-text) 0%,var(--flux-primary-light) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand .tagline{font-size:.7rem;color:var(--flux-text-muted);margin-top:2px;font-weight:300;letter-spacing:1px}
.tabs{display:flex;gap:.25rem;margin-bottom:1.5rem;background:var(--flux-surface-mid);border-radius:10px;padding:4px;border:1px solid rgba(255,255,255,.06)}
.tab{flex:1;padding:.5rem;border:none;background:transparent;font-family:var(--font-b);font-weight:600;font-size:.8rem;color:var(--flux-text-muted);cursor:pointer;border-radius:8px;transition:all .2s}
.tab:hover{color:var(--flux-text)}
.tab.active{background:var(--flux-primary);color:var(--flux-text);box-shadow:0 4px 12px rgba(108,92,231,.4)}
.form-row{margin-bottom:1rem}
.form-label{display:block;font-size:.7rem;font-weight:600;color:var(--flux-text-muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;padding:.6rem .75rem;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;font-family:var(--font-b);font-size:.9rem;color:var(--flux-text);background:var(--flux-surface-mid);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--flux-primary)}
.form-input::placeholder{color:var(--flux-text-muted);opacity:.8}
.remember{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.remember input{width:18px;height:18px;accent-color:var(--flux-primary);cursor:pointer}
.remember label{font-size:.85rem;color:var(--flux-text-muted);cursor:pointer}
.btn{padding:.65rem 1.25rem;border-radius:10px;font-family:var(--font-b);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;border:none;width:100%}
.btn-primary{background:linear-gradient(135deg,var(--flux-primary),var(--flux-primary-dark));color:var(--flux-text);box-shadow:0 4px 16px rgba(108,92,231,.4)}
.btn-primary:hover{background:var(--flux-primary-light);color:var(--flux-surface-dark);box-shadow:0 6px 20px rgba(108,92,231,.5)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.err{background:rgba(255,107,107,.12);color:var(--flux-danger);padding:.5rem .75rem;border-radius:10px;font-size:.8rem;margin-bottom:1rem;display:none;border:1px solid rgba(255,107,107,.25)}
.err.show{display:block}
.panel{display:none}
.panel.active{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><div class="brand-bar"></div><div><h1>flux-board</h1><div class="tagline">Organize the flow. Ship what matters.</div></div></div>
  <div class="tabs">
    <button class="tab active" data-panel="login">Entrar</button>
    <button class="tab" data-panel="register">Cadastrar</button>
  </div>
  <div id="err" class="err"></div>

  <div id="panel-login" class="panel active">
    <form id="form-login" onsubmit="return doLogin(event)">
      <div class="form-row"><label class="form-label">Usuário ou E-mail</label><input class="form-input" id="login-user" type="text" placeholder="Usuário ou e-mail" autocomplete="username"></div>
      <div class="form-row"><label class="form-label">Senha</label><input class="form-input" id="login-pwd" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="remember"><input type="checkbox" id="login-remember" checked><label for="login-remember">Manter conectado (gravar no navegador)</label></div>
      <button type="submit" class="btn btn-primary" id="btn-login">Entrar</button>
    </form>
  </div>

  <div id="panel-register" class="panel">
    <form id="form-register" onsubmit="return doRegister(event)">
      <div class="form-row"><label class="form-label">Nome</label><input class="form-input" id="reg-name" type="text" placeholder="Seu nome completo" autocomplete="name"></div>
      <div class="form-row"><label class="form-label">E-mail</label><input class="form-input" id="reg-email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="form-row"><label class="form-label">Senha</label><input class="form-input" id="reg-pwd" type="password" placeholder="Mínimo 4 caracteres" autocomplete="new-password"></div>
      <div class="remember"><input type="checkbox" id="reg-remember" checked><label for="reg-remember">Manter conectado após cadastro</label></div>
      <button type="submit" class="btn btn-primary" id="btn-register">Cadastrar</button>
    </form>
  </div>
</div>

<script>
const AUTH_KEY = "reborn_auth";
const API = { login: "/api/auth/login", register: "/api/auth/register" };

function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg || "";
  el.classList.toggle("show", !!msg);
}

function setAuth(token, user, remember) {
  const data = { token, user };
  if (remember) localStorage.setItem(AUTH_KEY, JSON.stringify(data));
  else sessionStorage.setItem(AUTH_KEY, JSON.stringify(data));
}

async function doLogin(e) {
  e.preventDefault();
  showErr("");
  const user = document.getElementById("login-user").value.trim();
  const pwd = document.getElementById("login-pwd").value;
  const remember = document.getElementById("login-remember").checked;
  if (!user || !pwd) { showErr("Preencha usuário e senha."); return false; }
  const btn = document.getElementById("btn-login");
  btn.disabled = true;
  try {
    const r = await fetch(API.login, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pwd }),
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || "Erro ao entrar."); return false; }
    setAuth(data.token, data.user, remember);
    window.location.href = "boards.html";
  } catch (err) {
    showErr("Erro de conexão. Tente novamente.");
  } finally {
    btn.disabled = false;
  }
  return false;
}

async function doRegister(e) {
  e.preventDefault();
  showErr("");
  const name = document.getElementById("reg-name").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const pwd = document.getElementById("reg-pwd").value;
  const remember = document.getElementById("reg-remember").checked;
  if (!name || !email || !pwd) { showErr("Preencha todos os campos."); return false; }
  if (pwd.length < 4) { showErr("Senha deve ter pelo menos 4 caracteres."); return false; }
  const btn = document.getElementById("btn-register");
  btn.disabled = true;
  try {
    const r = await fetch(API.register, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password: pwd }),
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || "Erro ao cadastrar."); return false; }
    setAuth(data.token, data.user, remember);
    window.location.href = "boards.html";
  } catch (err) {
    showErr("Erro de conexão. Tente novamente.");
  } finally {
    btn.disabled = false;
  }
  return false;
}

document.querySelectorAll(".tab").forEach((t) => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("panel-" + t.dataset.panel).classList.add("active");
    showErr("");
  });
});

const stored = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
if (stored) {
  try {
    const { token } = JSON.parse(stored);
    fetch("/api/auth/me", { headers: { Authorization: "Bearer " + token } })
      .then((r) => r.json())
      .then((d) => { if (d.user) window.location.href = "boards.html"; })
      .catch(() => {});
  } catch (e) {}
}
</script>
</body>
</html>
